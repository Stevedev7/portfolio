apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: api
          image: ghcr.io/stevedev7/portfolio-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: JSON_SERVER_URL
              value: "http://json-server:3002"
            - name: JWT_EXPIRES_IN
              value: "1h"
          envFrom:
            - secretRef:
                name: api-secrets
          volumeMounts:
            - name: logs
              mountPath: /app/apps/api/logs
      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: api-logs

