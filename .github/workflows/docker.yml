name: Docker Build and Push

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: api
            dockerfile: docker/api/Dockerfile
          - name: json-server
            dockerfile: docker/json-server/Dockerfile
          - name: admin
            dockerfile: docker/admin/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA and lowercase owner
        run: |
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/portfolio-${{ matrix.name }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/portfolio-${{ matrix.name }}:${{ env.SHORT_SHA }}
