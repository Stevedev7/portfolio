name: Deploy

on:
  workflow_run:
    workflows: ["Docker Build and Push"]
    types:
      - completed
    branches: [master]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    environment: divine-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure namespace exists
        run: kubectl apply -f k8s/namespace.yaml

      - name: Create or update API secret
        run: |
          kubectl create secret generic api-secrets \
            --namespace=portfolio \
            --from-literal=ADMIN_USERNAME='${{ secrets.K8S_ADMIN_USERNAME }}' \
            --from-literal=ADMIN_PASSWORD_HASH='${{ secrets.K8S_ADMIN_PASSWORD_HASH }}' \
            --from-literal=JWT_SECRET='${{ secrets.K8S_JWT_SECRET }}' \
            --from-literal=ALLOWED_ORIGINS='${{ vars.K8S_ALLOWED_ORIGINS }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/ --recursive

      - name: Restart deployments to pull latest images
        run: kubectl rollout restart deployment -n portfolio
